name: Query DB
on: workflow_dispatch
jobs:
  query:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install --quiet sqlalchemy psycopg2-binary
      - name: Query
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python -c "
import os
from sqlalchemy import create_engine, text
engine = create_engine(os.environ['DATABASE_URL'])
with engine.connect() as conn:
    r = conn.execute(text('SELECT MAX(date) FROM taiwan_stock_institutional'))
    print('三大法人:', r.scalar())
    r = conn.execute(text('SELECT MAX(date) FROM taiwan_stock_futures'))
    print('期貨:', r.scalar())
    r = conn.execute(text('SELECT MAX(date) FROM taiwan_stock_margin'))
    print('融資融券:', r.scalar())
    r = conn.execute(text('SELECT MAX(date) FROM taiwan_stock_industry_day'))
    print('產業日資料:', r.scalar())
"
