name: DB Check

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install --quiet sqlalchemy psycopg2-binary
      - name: Run check
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          python << 'PYEOF'
import os
from sqlalchemy import create_engine, text

DATABASE_URL = os.environ.get('DATABASE_URL')
engine = create_engine(DATABASE_URL)

with engine.connect() as conn:
    r = conn.execute(text("SELECT MAX(date) FROM taiwan_stock_institutional"))
    print(f"三大法人: {r.scalar()}")
    r = conn.execute(text("SELECT MAX(date) FROM taiwan_stock_futures"))
    print(f"期貨: {r.scalar()}")
    r = conn.execute(text("SELECT MAX(date) FROM taiwan_stock_margin"))
    print(f"融資融券: {r.scalar()}")
    r = conn.execute(text("SELECT MAX(date) FROM taiwan_stock_industry_day"))
    print(f"產業日資料: {r.scalar()}")
PYEOF
