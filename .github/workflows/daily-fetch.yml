name: Daily Market Data Fetch

on:
  schedule:
    - cron: '30 9 * * 1-5'   # 17:30 CST — 喚醒後並行跑三個 job
    - cron: '0 14 * * *'     # 22:00 CST — 每日 Telegram 彙整（含假日）
  workflow_dispatch:
    inputs:
      job:
        description: 'Job to run'
        required: true
        default: 'all'
        type: choice
        options:
          - institutional
          - futures
          - margin
          - daily-digest
          - all

# ── 1. 喚醒 Render ────────────────────────────────────────────
jobs:
  wake:
    if: |
      github.event.schedule == '30 9 * * 1-5' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.job != 'daily-digest')
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Wake up Render backend
        env:
          BACKEND_URL: ${{ secrets.RENDER_BACKEND_URL }}
        run: |
          echo "Warming up backend..."
          for j in $(seq 1 20); do
            STATUS_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 90 "$BACKEND_URL/api/v1/health") || STATUS_CODE="000"
            if [ "$STATUS_CODE" = "200" ]; then
              echo "Backend is awake (attempt $j)"
              exit 0
            fi
            echo "Waiting... attempt $j/20 (status: $STATUS_CODE)"
            sleep 10
          done
          echo "WARNING: backend did not respond after 20 attempts, proceeding anyway"

# ── 2. 三個資料 job 並行（等 wake 完成後同時啟動）─────────────

  institutional:
    needs: [wake]
    if: |
      always() && needs.wake.result != 'cancelled' &&
      (github.event.schedule == '30 9 * * 1-5' ||
      (github.event_name == 'workflow_dispatch' &&
        (github.event.inputs.job == 'institutional' || github.event.inputs.job == 'all')))
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      BACKEND_URL: ${{ secrets.RENDER_BACKEND_URL }}
      TRIGGER_SECRET: ${{ secrets.TRIGGER_SECRET }}
    steps:
      - name: Trigger institutional
        run: |
          MAX_RETRIES=3; WAIT_SEC=180; JOB_OK=0
          for i in $(seq 1 $MAX_RETRIES); do
            echo "--- Attempt $i / $MAX_RETRIES ---"
            EXTRA=""; [ "$i" -eq "$MAX_RETRIES" ] && EXTRA="&notify=true"
            RESPONSE=$(curl -sS --max-time 300 -X POST \
              "$BACKEND_URL/api/v1/admin/trigger/institutional?secret=$TRIGGER_SECRET$EXTRA") \
              || RESPONSE="{}"
            echo "Response: $RESPONSE"
            STATUS=$(echo "$RESPONSE" | python3 -c \
              "import sys,json; d=json.load(sys.stdin); print(d.get('status','error'))" \
              2>/dev/null || echo "error")
            DATE_MATCH=$(echo "$RESPONSE" | python3 -c \
              "import sys,json; d=json.load(sys.stdin); print(str(d.get('date_match','false')).lower())" \
              2>/dev/null || echo "false")
            [ "$STATUS" = "skipped" ] && echo "Non-trading day, skipped." && JOB_OK=1 && break
            [ "$STATUS" != "error" ] && [ "$DATE_MATCH" = "true" ] && echo "Success." && JOB_OK=1 && break
            [ "$i" -lt "$MAX_RETRIES" ] && echo "Waiting ${WAIT_SEC}s..." && sleep "$WAIT_SEC"
          done
          [ "$JOB_OK" != "1" ] && echo "FAILED after $MAX_RETRIES attempts" && exit 1
          exit 0

  futures:
    needs: [wake]
    if: |
      always() && needs.wake.result != 'cancelled' &&
      (github.event.schedule == '30 9 * * 1-5' ||
      (github.event_name == 'workflow_dispatch' &&
        (github.event.inputs.job == 'futures' || github.event.inputs.job == 'all')))
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      BACKEND_URL: ${{ secrets.RENDER_BACKEND_URL }}
      TRIGGER_SECRET: ${{ secrets.TRIGGER_SECRET }}
    steps:
      - name: Trigger futures
        run: |
          MAX_RETRIES=3; WAIT_SEC=180; JOB_OK=0
          for i in $(seq 1 $MAX_RETRIES); do
            echo "--- Attempt $i / $MAX_RETRIES ---"
            EXTRA=""; [ "$i" -eq "$MAX_RETRIES" ] && EXTRA="&notify=true"
            RESPONSE=$(curl -sS --max-time 300 -X POST \
              "$BACKEND_URL/api/v1/admin/trigger/futures?secret=$TRIGGER_SECRET$EXTRA") \
              || RESPONSE="{}"
            echo "Response: $RESPONSE"
            STATUS=$(echo "$RESPONSE" | python3 -c \
              "import sys,json; d=json.load(sys.stdin); print(d.get('status','error'))" \
              2>/dev/null || echo "error")
            DATE_MATCH=$(echo "$RESPONSE" | python3 -c \
              "import sys,json; d=json.load(sys.stdin); print(str(d.get('date_match','false')).lower())" \
              2>/dev/null || echo "false")
            [ "$STATUS" = "skipped" ] && echo "Non-trading day, skipped." && JOB_OK=1 && break
            [ "$STATUS" != "error" ] && [ "$DATE_MATCH" = "true" ] && echo "Success." && JOB_OK=1 && break
            [ "$i" -lt "$MAX_RETRIES" ] && echo "Waiting ${WAIT_SEC}s..." && sleep "$WAIT_SEC"
          done
          [ "$JOB_OK" != "1" ] && echo "FAILED after $MAX_RETRIES attempts" && exit 1
          exit 0

  margin:
    needs: [wake]
    if: |
      always() && needs.wake.result != 'cancelled' &&
      (github.event.schedule == '30 9 * * 1-5' ||
      (github.event_name == 'workflow_dispatch' &&
        (github.event.inputs.job == 'margin' || github.event.inputs.job == 'all')))
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      BACKEND_URL: ${{ secrets.RENDER_BACKEND_URL }}
      TRIGGER_SECRET: ${{ secrets.TRIGGER_SECRET }}
    steps:
      - name: Trigger margin
        run: |
          MAX_RETRIES=3; WAIT_SEC=180; JOB_OK=0
          for i in $(seq 1 $MAX_RETRIES); do
            echo "--- Attempt $i / $MAX_RETRIES ---"
            EXTRA=""; [ "$i" -eq "$MAX_RETRIES" ] && EXTRA="&notify=true"
            RESPONSE=$(curl -sS --max-time 300 -X POST \
              "$BACKEND_URL/api/v1/admin/trigger/margin?secret=$TRIGGER_SECRET$EXTRA") \
              || RESPONSE="{}"
            echo "Response: $RESPONSE"
            STATUS=$(echo "$RESPONSE" | python3 -c \
              "import sys,json; d=json.load(sys.stdin); print(d.get('status','error'))" \
              2>/dev/null || echo "error")
            DATE_MATCH=$(echo "$RESPONSE" | python3 -c \
              "import sys,json; d=json.load(sys.stdin); print(str(d.get('date_match','false')).lower())" \
              2>/dev/null || echo "false")
            [ "$STATUS" = "skipped" ] && echo "Non-trading day, skipped." && JOB_OK=1 && break
            [ "$STATUS" != "error" ] && [ "$DATE_MATCH" = "true" ] && echo "Success." && JOB_OK=1 && break
            [ "$i" -lt "$MAX_RETRIES" ] && echo "Waiting ${WAIT_SEC}s..." && sleep "$WAIT_SEC"
          done
          [ "$JOB_OK" != "1" ] && echo "FAILED after $MAX_RETRIES attempts" && exit 1
          exit 0

# ── 3. 每日彙整（獨立，不依賴 wake）─────────────────────────

  daily-digest:
    if: |
      github.event.schedule == '0 14 * * *' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'daily-digest')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      BACKEND_URL: ${{ secrets.RENDER_BACKEND_URL }}
      TRIGGER_SECRET: ${{ secrets.TRIGGER_SECRET }}
    steps:
      - name: Wake up (brief)
        run: |
          for j in $(seq 1 6); do
            STATUS_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 \
              "$BACKEND_URL/api/v1/health") || STATUS_CODE="000"
            [ "$STATUS_CODE" = "200" ] && echo "Backend awake" && break
            echo "attempt $j/6 (status: $STATUS_CODE)"; sleep 10
          done
      - name: Trigger daily-digest
        run: |
          RESPONSE=$(curl -sS --max-time 120 -X POST \
            "$BACKEND_URL/api/v1/admin/daily-digest?secret=$TRIGGER_SECRET" \
            || echo '{"status":"error"}')
          echo "Response: $RESPONSE"
          STATUS=$(echo "$RESPONSE" | python3 -c \
            "import sys,json; d=json.load(sys.stdin); print(d.get('status','error'))" \
            2>/dev/null || echo "error")
          [ "$STATUS" != "ok" ] && echo "daily-digest failed" && exit 1
          exit 0
