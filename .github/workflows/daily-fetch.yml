name: Daily Market Data Fetch

on:
  schedule:
    - cron: '30 9 * * 1-5'   # 17:30 CST вҖ” жҠ“зӣӨеҫҢиіҮж–ҷ
    - cron: '0 14 * * *'     # 22:00 CST вҖ” жҜҸж—Ҙ Telegram еҪҷж•ҙпјҲеҗ«еҒҮж—Ҙпјү
  workflow_dispatch:
    inputs:
      job:
        description: 'Job to run'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - institutional
          - futures
          - margin
          - industry
          - daily-digest

# в”Җв”Җ 1. е–ҡйҶ’ Render в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
jobs:
  wake:
    if: |
      github.event.schedule == '30 9 * * 1-5' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.job != 'daily-digest')
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Wake up Render backend
        env:
          BACKEND_URL: ${{ secrets.RENDER_BACKEND_URL }}
        run: |
          echo "Warming up backend..."
          for j in $(seq 1 20); do
            SC=$(curl -s -o /dev/null -w "%{http_code}" --max-time 90 "$BACKEND_URL/api/v1/health") || SC="000"
            if [ "$SC" = "200" ]; then
              echo "Backend is awake (attempt $j)"
              exit 0
            fi
            echo "Waiting... attempt $j/20 (status: $SC)"
            sleep 10
          done
          echo "WARNING: backend did not respond after 20 attempts, proceeding anyway"

# в”Җв”Җ 2. иіҮж–ҷжҠ“еҸ–пјҲе–®дёҖ jobпјҢеҫҢз«ҜдҫқеәҸеҹ·иЎҢ + иҮӘеӢ•и·ійҒҺе·ІжңүиіҮж–ҷпјүв”Җв”Җ

  fetch-all:
    needs: [wake]
    if: |
      always() && needs.wake.result != 'cancelled' &&
      (github.event.schedule == '30 9 * * 1-5' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.job != 'daily-digest'))
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      BACKEND_URL: ${{ secrets.RENDER_BACKEND_URL }}
      TRIGGER_SECRET: ${{ secrets.TRIGGER_SECRET }}
    steps:
      - name: Ensure backend is awake
        run: |
          for j in $(seq 1 10); do
            SC=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 "$BACKEND_URL/api/v1/health") || SC="000"
            [ "$SC" = "200" ] && echo "Backend alive (attempt $j)" && exit 0
            echo "attempt $j/10 (status: $SC)"; sleep 10
          done
          echo "WARNING: backend not responding, proceeding anyway"

      - name: Fire and poll
        run: |
          # еҲӨж–·иҰҒи·‘ all йӮ„жҳҜе–®дёҖ job
          JOB="${{ github.event.inputs.job || 'all' }}"
          ENDPOINT="$BACKEND_URL/api/v1/admin/trigger/$JOB"

          echo "=== Triggering $JOB ==="
          RESP=$(curl -sS --max-time 30 -X POST \
            "$ENDPOINT?secret=$TRIGGER_SECRET&notify=true") \
            || RESP="{}"
          echo "Trigger response: $RESP"

          STATUS=$(echo "$RESP" | python3 -c \
            "import sys,json; print(json.load(sys.stdin).get('status','error'))" \
            2>/dev/null || echo "error")
          DATE_MATCH=$(echo "$RESP" | python3 -c \
            "import sys,json; print(str(json.load(sys.stdin).get('date_match','false')).lower())" \
            2>/dev/null || echo "false")

          # йқһдәӨжҳ“ж—Ҙ
          [ "$STATUS" = "skipped" ] && echo "Non-trading day." && exit 0
          # е…ЁйғЁе·ІжңүиіҮж–ҷ (cached)
          [ "$DATE_MATCH" = "true" ] && echo "All data already cached." && exit 0
          # е·ІжҺҘеҸ—пјҢйҖІе…Ҙ polling
          [ "$STATUS" != "accepted" ] && echo "Unexpected status: $STATUS" && exit 1

          echo "=== Polling for completion (every 15s, max 15 min) ==="
          for p in $(seq 1 60); do
            sleep 15
            POLL=$(curl -sS --max-time 15 \
              "$BACKEND_URL/api/v1/admin/job-status/$JOB?secret=$TRIGGER_SECRET") \
              || POLL="{}"
            PSTATUS=$(echo "$POLL" | python3 -c \
              "import sys,json; print(json.load(sys.stdin).get('status','unknown'))" \
              2>/dev/null || echo "unknown")
            PMATCH=$(echo "$POLL" | python3 -c \
              "import sys,json; print(str(json.load(sys.stdin).get('date_match','false')).lower())" \
              2>/dev/null || echo "false")
            echo "  poll $p/60: status=$PSTATUS date_match=$PMATCH"

            # йӮ„еңЁи·‘пјҲеҢ…жӢ¬ unknown = poll timeout/backend unresponsiveпјҢеҸҜиғҪжҳҜ OOM жҒўеҫ©дёӯпјү
            [ "$PSTATUS" = "running" ] || [ "$PSTATUS" = "accepted" ] || [ "$PSTATUS" = "unknown" ] && continue
            # жҲҗеҠҹпјҲdate_match еғ…дҫӣеҸғиҖғпјҢstatus=ok еҚіз®—е®ҢжҲҗпјү
            [ "$PSTATUS" = "ok" ] && echo "Success! date_match=$PMATCH" && exit 0
            # еӨұж•—
            echo "Job ended with status=$PSTATUS date_match=$PMATCH"
            echo "Full response: $POLL"
            exit 1
          done
          echo "TIMEOUT: job did not complete in 15 minutes" && exit 1

# в”Җв”Җ 3. жҜҸж—ҘеҪҷж•ҙпјҲзҚЁз«ӢпјҢдёҚдҫқиіҙ wakeпјүв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

  daily-digest:
    if: |
      github.event.schedule == '0 14 * * *' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'daily-digest')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      BACKEND_URL: ${{ secrets.RENDER_BACKEND_URL }}
      TRIGGER_SECRET: ${{ secrets.TRIGGER_SECRET }}
    steps:
      - name: Wake up (brief)
        run: |
          for j in $(seq 1 6); do
            SC=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 \
              "$BACKEND_URL/api/v1/health") || SC="000"
            [ "$SC" = "200" ] && echo "Backend awake" && break
            echo "attempt $j/6 (status: $SC)"; sleep 10
          done
      - name: Trigger daily-digest
        run: |
          RESPONSE=$(curl -sS --max-time 120 -X POST \
            "$BACKEND_URL/api/v1/admin/daily-digest?secret=$TRIGGER_SECRET" \
            || echo '{"status":"error"}')
          echo "Response: $RESPONSE"
          STATUS=$(echo "$RESPONSE" | python3 -c \
            "import sys,json; d=json.load(sys.stdin); print(d.get('status','error'))" \
            2>/dev/null || echo "error")
          [ "$STATUS" != "ok" ] && echo "daily-digest failed" && exit 1
          exit 0
