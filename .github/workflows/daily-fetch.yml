name: Daily Market Data Fetch

on:
  schedule:
    # 台灣時間（UTC+8）→ UTC
    - cron: '0 9 * * 1-5'    # 17:00 CST — 法人買賣超
    - cron: '30 9 * * 1-5'   # 17:30 CST — 期貨OI + 選擇權
    - cron: '45 9 * * 1-5'   # 17:45 CST — 融資券
  workflow_dispatch:          # 允許手動觸發（測試用）
    inputs:
      job:
        description: 'Job to run (institutional / futures / margin)'
        required: true
        default: 'institutional'
        type: choice
        options: [institutional, futures, margin, all]

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Determine job name
        id: job
        env:
          EVENT_NAME: ${{ github.event_name }}
          EVENT_SCHEDULE: ${{ github.event.schedule }}
          INPUT_JOB: ${{ github.event.inputs.job }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            JOB_NAME="$INPUT_JOB"
          elif [ "$EVENT_SCHEDULE" = "0 9 * * 1-5" ]; then
            JOB_NAME="institutional"
          elif [ "$EVENT_SCHEDULE" = "30 9 * * 1-5" ]; then
            JOB_NAME="futures"
          else
            JOB_NAME="margin"
          fi
          echo "name=$JOB_NAME" >> "$GITHUB_OUTPUT"

      - name: Wake up Render backend
        env:
          BACKEND_URL: ${{ secrets.RENDER_BACKEND_URL }}
        run: |
          echo "Warming up backend..."
          for j in $(seq 1 12); do
            STATUS_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 90 "$BACKEND_URL/api/v1/health") || STATUS_CODE="000"
            if [ "$STATUS_CODE" = "200" ]; then
              echo "Backend is awake (attempt $j)"
              break
            fi
            echo "Waiting... attempt $j/12 (status: $STATUS_CODE)"
            sleep 10
          done

      - name: Trigger fetch with retry
        env:
          BACKEND_URL: ${{ secrets.RENDER_BACKEND_URL }}
          TRIGGER_SECRET: ${{ secrets.TRIGGER_SECRET }}
          JOB_NAME: ${{ steps.job.outputs.name }}
        run: |
          if [ "$JOB_NAME" = "all" ]; then
            JOBS="institutional futures margin"
          else
            JOBS="$JOB_NAME"
          fi

          for CURRENT_JOB in $JOBS; do
            echo "=== Triggering job: $CURRENT_JOB ==="
            MAX_RETRIES=3
            WAIT_SEC=180

            for i in $(seq 1 $MAX_RETRIES); do
              echo "--- Attempt $i / $MAX_RETRIES ---"
              RESPONSE=$(curl -s --max-time 300 -X POST \
                "$BACKEND_URL/api/v1/admin/trigger/$CURRENT_JOB?secret=$TRIGGER_SECRET") || RESPONSE="{}"
              echo "Response: $RESPONSE"

              STATUS=$(echo "$RESPONSE" | python3 -c \
                "import sys,json; d=json.load(sys.stdin); print(d.get('status','error'))" 2>/dev/null || echo "error")
              DATE_MATCH=$(echo "$RESPONSE" | python3 -c \
                "import sys,json; d=json.load(sys.stdin); print(d.get('date_match','false'))" 2>/dev/null || echo "false")

              if [ "$STATUS" = "skipped" ]; then
                echo "Today is not a trading day. Skipping."
                break
              fi

              DATE_MATCH_LOWER=$(echo "$DATE_MATCH" | tr '[:upper:]' '[:lower:]')
              if [ "$STATUS" = "ok" ] && [ "$DATE_MATCH_LOWER" = "true" ]; then
                echo "Success! Data date matches expected."
                break
              fi

              if [ $i -lt $MAX_RETRIES ]; then
                echo "Data not yet updated. Waiting 3 minutes before retry..."
                sleep $WAIT_SEC
              fi
            done

            echo "=== Done: $CURRENT_JOB ==="
          done

          exit 0
