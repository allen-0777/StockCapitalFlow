name: Daily Digest

on:
  schedule:
    - cron: '0 14 * * *'     # 22:00 CST — 每日 Telegram 彙整（含假日）
  workflow_dispatch:
    inputs:
      job:
        description: 'Job to run'
        required: true
        default: 'daily-digest'
        type: choice
        options:
          - daily-digest

# ── 每日彙整（呼叫 Render 發送 Telegram 通知）────────────────

jobs:
  daily-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      BACKEND_URL: ${{ secrets.RENDER_BACKEND_URL }}
      TRIGGER_SECRET: ${{ secrets.TRIGGER_SECRET }}
    steps:
      - name: Wake up (brief)
        run: |
          for j in $(seq 1 6); do
            SC=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 \
              "$BACKEND_URL/api/v1/health") || SC="000"
            [ "$SC" = "200" ] && echo "Backend awake" && break
            echo "attempt $j/6 (status: $SC)"; sleep 10
          done
      - name: Trigger daily-digest
        run: |
          RESPONSE=$(curl -sS --max-time 120 -X POST \
            "$BACKEND_URL/api/v1/admin/daily-digest?secret=$TRIGGER_SECRET" \
            || echo '{"status":"error"}')
          echo "Response: $RESPONSE"
          STATUS=$(echo "$RESPONSE" | python3 -c \
            "import sys,json; d=json.load(sys.stdin); print(d.get('status','error'))" \
            2>/dev/null || echo "error")
          [ "$STATUS" != "ok" ] && echo "daily-digest failed" && exit 1
          exit 0
