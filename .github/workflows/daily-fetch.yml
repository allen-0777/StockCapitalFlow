name: Daily Market Data Fetch

on:
  schedule:
    - cron: '30 9 * * 1-5'   # 17:30 CST — 依序跑三個 job
    - cron: '0 14 * * *'     # 22:00 CST — 每日 Telegram 彙整（含假日）
  workflow_dispatch:
    inputs:
      job:
        description: 'Job to run'
        required: true
        default: 'all'
        type: choice
        options:
          - institutional
          - futures
          - margin
          - daily-digest
          - all

# ── 1. 喚醒 Render ────────────────────────────────────────────
jobs:
  wake:
    if: |
      github.event.schedule == '30 9 * * 1-5' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.job != 'daily-digest')
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Wake up Render backend
        env:
          BACKEND_URL: ${{ secrets.RENDER_BACKEND_URL }}
        run: |
          echo "Warming up backend..."
          for j in $(seq 1 20); do
            STATUS_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 90 "$BACKEND_URL/api/v1/health") || STATUS_CODE="000"
            if [ "$STATUS_CODE" = "200" ]; then
              echo "Backend is awake (attempt $j)"
              exit 0
            fi
            echo "Waiting... attempt $j/20 (status: $STATUS_CODE)"
            sleep 10
          done
          echo "WARNING: backend did not respond after 20 attempts, proceeding anyway"

# ── 2. 三個資料 job（fire-and-poll，避免長請求 OOM crash）─────

  institutional:
    needs: [wake]
    if: |
      always() && needs.wake.result != 'cancelled' &&
      (github.event.schedule == '30 9 * * 1-5' ||
      (github.event_name == 'workflow_dispatch' &&
        (github.event.inputs.job == 'institutional' || github.event.inputs.job == 'all')))
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      BACKEND_URL: ${{ secrets.RENDER_BACKEND_URL }}
      TRIGGER_SECRET: ${{ secrets.TRIGGER_SECRET }}
    steps:
      - name: Ensure backend is awake
        run: |
          for j in $(seq 1 10); do
            SC=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 "$BACKEND_URL/api/v1/health") || SC="000"
            [ "$SC" = "200" ] && echo "Backend alive (attempt $j)" && exit 0
            echo "attempt $j/10 (status: $SC)"; sleep 10
          done
          echo "WARNING: backend not responding, proceeding anyway"
      - name: Fire and poll institutional
        run: |
          # 1) Fire: trigger 會秒回 accepted，背景執行
          echo "=== Triggering institutional ==="
          RESP=$(curl -sS --max-time 30 -X POST \
            "$BACKEND_URL/api/v1/admin/trigger/institutional?secret=$TRIGGER_SECRET&notify=true") \
            || RESP="{}"
          echo "Trigger response: $RESP"
          STATUS=$(echo "$RESP" | python3 -c "import sys,json; print(json.load(sys.stdin).get('status','error'))" 2>/dev/null || echo "error")
          [ "$STATUS" = "skipped" ] && echo "Non-trading day." && exit 0
          # cached hit (already done)
          DATE_MATCH=$(echo "$RESP" | python3 -c "import sys,json; print(str(json.load(sys.stdin).get('date_match','false')).lower())" 2>/dev/null || echo "false")
          [ "$STATUS" != "error" ] && [ "$DATE_MATCH" = "true" ] && echo "Already done (cached)." && exit 0
          [ "$STATUS" != "accepted" ] && [ "$STATUS" != "ok" ] && echo "Unexpected: $STATUS" && exit 1

          # 2) Poll: 每 15 秒查一次 job-status，最多等 10 分鐘
          echo "=== Polling for completion ==="
          for p in $(seq 1 40); do
            sleep 15
            POLL=$(curl -sS --max-time 15 \
              "$BACKEND_URL/api/v1/admin/job-status/institutional?secret=$TRIGGER_SECRET") \
              || POLL="{}"
            PSTATUS=$(echo "$POLL" | python3 -c "import sys,json; print(json.load(sys.stdin).get('status','unknown'))" 2>/dev/null || echo "unknown")
            PMATCH=$(echo "$POLL" | python3 -c "import sys,json; print(str(json.load(sys.stdin).get('date_match','false')).lower())" 2>/dev/null || echo "false")
            echo "  poll $p/40: status=$PSTATUS date_match=$PMATCH"
            [ "$PSTATUS" = "running" ] || [ "$PSTATUS" = "accepted" ] && continue
            [ "$PSTATUS" != "error" ] && [ "$PMATCH" = "true" ] && echo "Success." && exit 0
            [ "$PSTATUS" = "error" ] && echo "Job failed on backend." && exit 1
            # partial or unexpected
            echo "Final status: $PSTATUS" && exit 1
          done
          echo "TIMEOUT: job did not complete in 10 minutes" && exit 1

  futures:
    needs: [institutional]
    if: |
      always() && needs.institutional.result != 'cancelled' &&
      (github.event.schedule == '30 9 * * 1-5' ||
      (github.event_name == 'workflow_dispatch' &&
        (github.event.inputs.job == 'futures' || github.event.inputs.job == 'all')))
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      BACKEND_URL: ${{ secrets.RENDER_BACKEND_URL }}
      TRIGGER_SECRET: ${{ secrets.TRIGGER_SECRET }}
    steps:
      - name: Ensure backend is awake
        run: |
          for j in $(seq 1 10); do
            SC=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 "$BACKEND_URL/api/v1/health") || SC="000"
            [ "$SC" = "200" ] && echo "Backend alive (attempt $j)" && exit 0
            echo "attempt $j/10 (status: $SC)"; sleep 10
          done
          echo "WARNING: backend not responding, proceeding anyway"
      - name: Fire and poll futures
        run: |
          RESP=$(curl -sS --max-time 30 -X POST \
            "$BACKEND_URL/api/v1/admin/trigger/futures?secret=$TRIGGER_SECRET&notify=true") \
            || RESP="{}"
          echo "Trigger response: $RESP"
          STATUS=$(echo "$RESP" | python3 -c "import sys,json; print(json.load(sys.stdin).get('status','error'))" 2>/dev/null || echo "error")
          [ "$STATUS" = "skipped" ] && echo "Non-trading day." && exit 0
          DATE_MATCH=$(echo "$RESP" | python3 -c "import sys,json; print(str(json.load(sys.stdin).get('date_match','false')).lower())" 2>/dev/null || echo "false")
          [ "$STATUS" != "error" ] && [ "$DATE_MATCH" = "true" ] && echo "Already done (cached)." && exit 0
          [ "$STATUS" != "accepted" ] && [ "$STATUS" != "ok" ] && echo "Unexpected: $STATUS" && exit 1

          echo "=== Polling for completion ==="
          for p in $(seq 1 40); do
            sleep 15
            POLL=$(curl -sS --max-time 15 \
              "$BACKEND_URL/api/v1/admin/job-status/futures?secret=$TRIGGER_SECRET") \
              || POLL="{}"
            PSTATUS=$(echo "$POLL" | python3 -c "import sys,json; print(json.load(sys.stdin).get('status','unknown'))" 2>/dev/null || echo "unknown")
            PMATCH=$(echo "$POLL" | python3 -c "import sys,json; print(str(json.load(sys.stdin).get('date_match','false')).lower())" 2>/dev/null || echo "false")
            echo "  poll $p/40: status=$PSTATUS date_match=$PMATCH"
            [ "$PSTATUS" = "running" ] || [ "$PSTATUS" = "accepted" ] && continue
            [ "$PSTATUS" != "error" ] && [ "$PMATCH" = "true" ] && echo "Success." && exit 0
            [ "$PSTATUS" = "error" ] && echo "Job failed on backend." && exit 1
            echo "Final status: $PSTATUS" && exit 1
          done
          echo "TIMEOUT: job did not complete in 10 minutes" && exit 1

  margin:
    needs: [futures]
    if: |
      always() && needs.futures.result != 'cancelled' &&
      (github.event.schedule == '30 9 * * 1-5' ||
      (github.event_name == 'workflow_dispatch' &&
        (github.event.inputs.job == 'margin' || github.event.inputs.job == 'all')))
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      BACKEND_URL: ${{ secrets.RENDER_BACKEND_URL }}
      TRIGGER_SECRET: ${{ secrets.TRIGGER_SECRET }}
    steps:
      - name: Ensure backend is awake
        run: |
          for j in $(seq 1 10); do
            SC=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 "$BACKEND_URL/api/v1/health") || SC="000"
            [ "$SC" = "200" ] && echo "Backend alive (attempt $j)" && exit 0
            echo "attempt $j/10 (status: $SC)"; sleep 10
          done
          echo "WARNING: backend not responding, proceeding anyway"
      - name: Fire and poll margin
        run: |
          RESP=$(curl -sS --max-time 30 -X POST \
            "$BACKEND_URL/api/v1/admin/trigger/margin?secret=$TRIGGER_SECRET&notify=true") \
            || RESP="{}"
          echo "Trigger response: $RESP"
          STATUS=$(echo "$RESP" | python3 -c "import sys,json; print(json.load(sys.stdin).get('status','error'))" 2>/dev/null || echo "error")
          [ "$STATUS" = "skipped" ] && echo "Non-trading day." && exit 0
          DATE_MATCH=$(echo "$RESP" | python3 -c "import sys,json; print(str(json.load(sys.stdin).get('date_match','false')).lower())" 2>/dev/null || echo "false")
          [ "$STATUS" != "error" ] && [ "$DATE_MATCH" = "true" ] && echo "Already done (cached)." && exit 0
          [ "$STATUS" != "accepted" ] && [ "$STATUS" != "ok" ] && echo "Unexpected: $STATUS" && exit 1

          echo "=== Polling for completion ==="
          for p in $(seq 1 40); do
            sleep 15
            POLL=$(curl -sS --max-time 15 \
              "$BACKEND_URL/api/v1/admin/job-status/margin?secret=$TRIGGER_SECRET") \
              || POLL="{}"
            PSTATUS=$(echo "$POLL" | python3 -c "import sys,json; print(json.load(sys.stdin).get('status','unknown'))" 2>/dev/null || echo "unknown")
            PMATCH=$(echo "$POLL" | python3 -c "import sys,json; print(str(json.load(sys.stdin).get('date_match','false')).lower())" 2>/dev/null || echo "false")
            echo "  poll $p/40: status=$PSTATUS date_match=$PMATCH"
            [ "$PSTATUS" = "running" ] || [ "$PSTATUS" = "accepted" ] && continue
            [ "$PSTATUS" != "error" ] && [ "$PMATCH" = "true" ] && echo "Success." && exit 0
            [ "$PSTATUS" = "error" ] && echo "Job failed on backend." && exit 1
            echo "Final status: $PSTATUS" && exit 1
          done
          echo "TIMEOUT: job did not complete in 10 minutes" && exit 1

# ── 3. 每日彙整（獨立，不依賴 wake）─────────────────────────

  daily-digest:
    if: |
      github.event.schedule == '0 14 * * *' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'daily-digest')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      BACKEND_URL: ${{ secrets.RENDER_BACKEND_URL }}
      TRIGGER_SECRET: ${{ secrets.TRIGGER_SECRET }}
    steps:
      - name: Wake up (brief)
        run: |
          for j in $(seq 1 6); do
            STATUS_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 \
              "$BACKEND_URL/api/v1/health") || STATUS_CODE="000"
            [ "$STATUS_CODE" = "200" ] && echo "Backend awake" && break
            echo "attempt $j/6 (status: $STATUS_CODE)"; sleep 10
          done
      - name: Trigger daily-digest
        run: |
          RESPONSE=$(curl -sS --max-time 120 -X POST \
            "$BACKEND_URL/api/v1/admin/daily-digest?secret=$TRIGGER_SECRET" \
            || echo '{"status":"error"}')
          echo "Response: $RESPONSE"
          STATUS=$(echo "$RESPONSE" | python3 -c \
            "import sys,json; d=json.load(sys.stdin); print(d.get('status','error'))" \
            2>/dev/null || echo "error")
          [ "$STATUS" != "ok" ] && echo "daily-digest failed" && exit 1
          exit 0
