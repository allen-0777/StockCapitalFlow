name: Keep Backend Awake

on:
  schedule:
    - cron: "0 */5 * * *"  # Every 5 hours
  workflow_dispatch: {}    # Manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Ping backend
        run: |
          BACKEND_URL="${{ secrets.RENDER_BACKEND_URL }}"
          echo "Pinging $BACKEND_URL..."
          
          for i in 1 2 3; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 "$BACKEND_URL/api/v1/health" || echo "000")
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Backend is awake!"
              exit 0
            fi
            sleep 5
          done
          
          echo "Backend did not respond, but ping recorded."
          exit 0
