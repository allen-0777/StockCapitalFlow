# 正二雷達推播：讀取 Supabase DB 計算訊號並發 Telegram，不抓外部 API。
# 分工說明：
#   fetch-direct.yml  — 資料抓取寫入 DB（UTC 09:30，CST 17:30）
#   本檔             — 讀 DB 推播（UTC 10:10，CST 18:10，約晚 40 分鐘）
#   daily-fetch.yml  — 每日 Telegram 彙整通知（UTC 14:00，CST 22:00）
# 需要 secrets：DATABASE_URL、TELEGRAM_BOT_TOKEN、TELEGRAM_CHAT_ID
# 不需要 FINMIND_TOKEN（僅讀 DB）
name: Zheng2 Radar Push

on:
  schedule:
    # UTC 10:10 = CST 18:10，fetch-direct 結束後約 40 分鐘，週一至五
    - cron: '10 10 * * 1-5'
  workflow_dispatch: {}   # 手動補推播用

jobs:
  push:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install --quiet sqlalchemy psycopg2-binary aiohttp python-dotenv exchange-calendars

      # TELEGRAM_BOT_TOKEN / TELEGRAM_CHAT_ID 透過 env 傳入（secrets 不直接拼入指令）
      - name: Push Zheng2 Radar
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ZHENG2_RADAR_ENABLED: 'true'
        run: python backend/scripts/zheng2_push.py
